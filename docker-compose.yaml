services:

###############################################
# GLUETUN - VPN GATEWAY + KILL SWITCH
###############################################
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun

    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun

    networks:
      - arr_network

    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp

    volumes:
      - /docker/appdata/gluetun:/gluetun

    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - SERVER_COUNTRIES=${SERVER_COUNTRIES}
      - VPN_PORT_FORWARDING=${VPN_PORT_FORWARDING}
      - HTTP_CONTROL_SERVER_AUTH_CONFIG=disable
      - WIREGUARD_MTU=1280
    # DNS FIX
      - DNS_ADDRESS=1.1.1.1
      - DNS_UPSTREAM_PLAIN_ADDRESSES=1.1.1.1,8.8.8.8
      - DOT=off


    restart: unless-stopped

###############################################
# GLUETUN WEB UI
###############################################
  gluetun-webui:
    image: scuzza/gluetun-webui:latest
    container_name: gluetun-webui

    depends_on:
      - gluetun

    ports:
      - "127.0.0.1:3000:3000"

    environment:
      - GLUETUN_CONTROL_URL=http://gluetun:8000
      - TRUST_PROXY=true

    networks:
      - arr_network

    restart: unless-stopped

###############################################
# QBITTORRENT (VPN ROUTED)
###############################################
  qbittorrent:
    image: ghcr.io/hotio/qbittorrent:latest
    container_name: qbittorrent

    network_mode: "service:gluetun"

    environment:
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}

    volumes:
      - /docker/appdata/qbittorrent:/config
      - /data:/data

    restart: unless-stopped

###############################################
# ARR APPS
###############################################
  radarr:
    image: ghcr.io/hotio/radarr:latest
    container_name: radarr
    ports:
      - 7878:7878
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /docker/appdata/radarr:/config
      - /data:/data
    networks:
      - arr_network
    restart: unless-stopped

  sonarr:
    image: ghcr.io/hotio/sonarr:latest
    container_name: sonarr
    ports:
      - 8989:8989
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /docker/appdata/sonarr:/config
      - /data:/data
    networks:
      - arr_network
    restart: unless-stopped

  prowlarr:
    image: ghcr.io/hotio/prowlarr:latest
    container_name: prowlarr
    ports:
      - 9696:9696
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /docker/appdata/prowlarr:/config
    networks:
      - arr_network
    restart: unless-stopped

###############################################
# JELLYFIN
###############################################
  jellyfin:
    container_name: jellyfin
    image: ghcr.io/hotio/jellyfin:latest

    ports:
      - 8096:8096
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}

    volumes:
      - /docker/appdata/jellyfin:/config
      - /data/media:/data/media:ro
###############################################
# NETWORK
###############################################
networks:
  arr_network:
    driver: bridge