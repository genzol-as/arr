services:
###############################################
# GLUETUN - VPN
###############################################
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      - arr
    ports:
      - 8080:8080     # qBittorrent WebUI
      - 6881:6881     # qBittorrent torrenting port
      - 6881:6881/udp
      - 9696:9696     # Prowlarr
    volumes:
      - ./gluetun:/gluetun
    environment:
      - HTTP_CONTROL_SERVER_ADDRESS=:8000
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      # --- WireGuard credentials (most providers) ---
      - WIREGUARD_PRIVATE_KEY=AFeNGbQ8mOWRqmXoYbiH9NgSHEwtG3tXMKYDZ6rLoWc=
      - SERVER_COUNTRIES=Netherlands
      - VPN_PORT_FORWARDING=off

  gluetun-webui:
    image: scuzza/gluetun-webui:latest
    container_name: gluetun-webui
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - gluetun
    environment:
      - GLUETUN_CONTROL_URL=http://gluetun:8000
      # Uncomment if Gluetun auth is enabled:
      #- GLUETUN_API_KEY=yourtoken
      #- GLUETUN_USER=username
      #- GLUETUN_PASSWORD=password
      # Set to 'true' if behind a reverse proxy (nginx, Traefik, etc.)
      - TRUST_PROXY=true
    
    networks:
      - arr
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
networks:
  arr:
    driver: bridge
